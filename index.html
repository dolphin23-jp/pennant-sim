function recoverTeamsStatus(teams,pitcherRec=14,batterRec=7,dayStep=1){
  const next={...teams};
  Object.keys(next).forEach(k=>{
    next[k]={...next[k],
      pitchers:next[k].pitchers.map(p=>({...p,fatigue:Math.max(0,(p.fatigue||0)-pitcherRec*Math.max(1,dayStep)),injuryDays:Math.max(0,(p.injuryDays||0)-dayStep)})),
      fielders:next[k].fielders.map(f=>({...f,fatigue:Math.max(0,(f.fatigue||0)-batterRec*Math.max(1,dayStep)),injuryDays:Math.max(0,(f.injuryDays||0)-dayStep)})),
    };
  });
  return next;
}
function applyInjuriesFromFatigue(teams){
  const next={...teams};
  Object.keys(next).forEach(k=>{
    next[k]={...next[k],
      pitchers:next[k].pitchers.map(p=>{
        if((p.injuryDays||0)>0) return p;
        const ageRisk=p.age>=35?0.0038:p.age>=31?0.0021:p.age<=22?0.0014:0.0010;
        let prob=ageRisk+((p.fatigue||0)>=92?0.090:(p.fatigue||0)>=82?0.040:(p.fatigue||0)>=70?0.017:(p.fatigue||0)>=58?0.007:0);
        if(p.role==='先発') prob*=1.08;
        if(hsa(p,'iron')) prob*=0.52;
        if(_r()>=prob) return p;
        const sevRoll=_r(); const sev=sevRoll<0.66?'light':sevRoll<0.92?'mid':'heavy';
        const days=sev==='light'?ri(5,12):sev==='mid'?ri(15,38):ri(70,150);
        return {...p,injuryDays:days,injurySeverity:sev};
      }),
      fielders:next[k].fielders.map(f=>{
        if((f.injuryDays||0)>0) return f;
        const ageRisk=f.age>=35?0.0024:f.age>=31?0.0014:0.0008;
        let prob=ageRisk+((f.fatigue||0)>=92?0.060:(f.fatigue||0)>=82?0.028:(f.fatigue||0)>=70?0.011:(f.fatigue||0)>=58?0.0045:0);
        if(hsa(f,'iron')) prob*=0.58;
        if(_r()>=prob) return f;
        const sevRoll=_r(); const sev=sevRoll<0.70?'light':sevRoll<0.93?'mid':'heavy';
        const days=sev==='light'?ri(4,10):sev==='mid'?ri(10,28):ri(50,110);
        return {...f,injuryDays:days,injurySeverity:sev};
      }),
    };
  });
  return next;
}
function collectNewInjuryNotices(prevTeams,nextTeams,playerTeam){
  const prevMap=Object.fromEntries([...(prevTeams?.[playerTeam]?.pitchers||[]),...(prevTeams?.[playerTeam]?.fielders||[])].map(p=>[p.id,p]));
  return ([...(nextTeams?.[playerTeam]?.pitchers||[]),...(nextTeams?.[playerTeam]?.fielders||[])].filter(p=>(p.injuryDays||0)>0 && !(prevMap[p.id]?.injuryDays>0))).map(p=>({title:`離脱: ${p.name}`,body:injuryStatusLabel(p),tone:'warn'}));
}

function applyTeamFatigue(teams, game, playerTeam){
  if(!teams||!game) return teams;
  const next={...teams};
  Object.keys(next).forEach(k=>{
    next[k]={...next[k],
      pitchers:next[k].pitchers.map(p=>({...p,fatigue:Math.max(0,(p.fatigue||0)-8)})),
      fielders:next[k].fielders.map(f=>({...f,fatigue:Math.max(0,(f.fatigue||0)-4)})),
    };
  });
  const touchPitcher=(tk,id,delta)=>{const t=next[tk];if(!t)return; t.pitchers=t.pitchers.map(p=>p.id===id?{...p,fatigue:cl((p.fatigue||0)+delta,0,100)}:p);};
  const touchBatter=(tk,id,delta)=>{const t=next[tk];if(!t)return; t.fielders=t.fielders.map(f=>f.id===id?{...f,fatigue:cl((f.fatigue||0)+delta,0,100)}:f);};
  const batterSeen=new Set();const pitcherPC={};const pitcherTeam={};
  game.atBatLog.forEach(ab=>{const batterTk=ab.bSide==='home'?game.teams.home.key:game.teams.away.key;const pitcherTk=ab.pSide==='home'?game.teams.home.key:game.teams.away.key;if(!batterSeen.has(ab.batterId)){touchBatter(batterTk,ab.batterId,6);batterSeen.add(ab.batterId);}pitcherPC[ab.pitcherId]=(pitcherPC[ab.pitcherId]||0)+(ab.pc||3);pitcherTeam[ab.pitcherId]=pitcherTk;});
  Object.entries(pitcherPC).forEach(([id,pc])=>{const tk=pitcherTeam[id],team=next[tk],p=team?.pitchers?.find(x=>x.id===id);if(!p)return;const isStarter=id===game.starterH?.id||id===game.starterA?.id;touchPitcher(tk,id,Math.round((isStarter?14:7)+pc/(isStarter?3.8:4.4)+(pc>=95?6:pc>=80?3:0)));});
  return next;
}

function calcOVR(player,pos){
  if(!player) return 50;
  if(player.isP===true){const w=OVR_W_PIT[player.role]||OVR_W_PIT['リリーフ'];const p=player.p;return Math.round((p.vel||50)*w.vel+(p.ctrl||50)*w.ctrl+(p.stam||50)*w.stam+(p.nobi||50)*w.nobi+(p.fld||50)*w.fld);}
  const resolvedPos=pos||player._assignedPos||player.pos||'左翼手',w=OVR_W[resolvedPos]||OVR_W['左翼手'],p=player.p;
  return Math.round((p.cf||50)*w.cf+(p.cb||50)*w.cb+(p.pw||50)*w.pw+(p.dc||50)*w.dc+(p.sp||50)*w.sp+(p.df||50)*w.df+(p.arm||50)*(w.arm||0)+(p.ld||0)*(w.ld||0)+(p.stam||50)*(w.stam||0.03));
}
function aptFor(player,pos){if(!player.positions)return player.pos===pos?100:55;const f=player.positions.find(pp=>pp.pos===pos);return f?f.apt:(player.pos===pos?100:45);}
function effOVR(player,pos){if(!player) return 50;const resolvedPos=pos||player._assignedPos||player.pos||'左翼手';const base=calcOVR(player,resolvedPos);const apt=aptFor(player,resolvedPos);return Math.round(base*(0.70+apt/100*0.30));}
const ovrColor=v=>v>=90?'#ffd400':v>=75?'#38f27f':v>=60?'#39b8ff':v>=50?'#f7fbff':'#86a6c8';
const potentialRank=v=>v>=25?'S':v>=15?'A':v>=8?'B':v>=3?'C':'D';
function playerPotentialLabel(player){
  const vals=Object.keys(player.pot||{}).map(k=>(player.pot[k]||0)-((player.p?.[k])||0));
  const best=Math.max(0,...vals);
  return potentialRank(best);
}
function trainPolicyName(id){
  return TRAIN_POLICIES.find(p=>p.id===id)?.n||'バランス';
}
function teamOVR(team,lineup){
  const lu=(lineup&&lineup.length?lineup:bestLineup(team)).slice(0,9);
  const bat=lu.length?lu.reduce((s,p)=>s+effOVR(p,p._assignedPos||p.pos),0)/lu.length:50;
  const starters=topStarters(team).slice(0,5);
  const sp=starters.length?starters.reduce((s,p)=>s+calcOVR(p),0)/starters.length:50;
  const bullpen=team.pitchers.filter(p=>p.role!=='先発').sort((a,b)=>calcOVR(b)-calcOVR(a)).slice(0,6);
  const rp=bullpen.length?bullpen.reduce((s,p)=>s+calcOVR(p),0)/bullpen.length:50;
  return Math.round(bat*0.45+sp*0.30+rp*0.25);
}
function bullpenGroups(team){
  const pen=team.pitchers.filter(p=>p.role!=='先発').sort((a,b)=>calcOVR(b)-calcOVR(a));
  return{
    closer:pen.filter(p=>p.role==='クローザー').slice(0,1),
    setup:pen.filter(p=>p.role==='リリーフ').slice(0,2),
    middle:pen.filter(p=>p.role==='リリーフ').slice(2,5),

  const posIdx=useMemo(()=>{const m={};FPOS.forEach(pos=>{m[pos]=lineup.findIndex(p=>(p._assignedPos||p.pos)===pos);});return m;},[lineup]);
  const bench=useMemo(()=>team.fielders.filter(f=>!lineup.some(lp=>lp.id===f.id)).sort((a,b)=>calcOVR(b,b.pos)-calcOVR(a,a.pos)),[team,lineup]);
  const selectedPlayer=useMemo(()=>{
    const all=[...lineup,...bench,...team.pitchers];
    return all.find(p=>p.id===detailId)||lineup?.[0]||null;
  },[lineup,bench,team,detailId]);

  const updateTeamPlayer=(playerId,updater)=>{
    if(!onTeamChange)return;
    const nextTeam={
      ...team,
      pitchers:team.pitchers.map(p=>p.id===playerId?updater({...p}):p),
      fielders:team.fielders.map(p=>p.id===playerId?updater({...p}):p),
    };
    onTeamChange(nextTeam);
  };
  const applyTrainPolicy=(playerId,policyId)=>updateTeamPlayer(playerId,p=>({...p,trainPolicy:policyId||'balanced'}));
  const bulkSetTrainPolicy=(selector,policyId)=>{
    if(!onTeamChange)return;
    const nextTeam={
      ...team,
      pitchers:team.pitchers.map(p=>selector(p)?{...p,trainPolicy:policyId}:p),
      fielders:team.fielders.map(p=>selector(p)?{...p,trainPolicy:policyId}:p),
    };
    onTeamChange(nextTeam);
  };
  const clearSelections=()=>{setSelectedIdx(null);setSelectedBenchId(null);};
  // 打順のみ入れ替え（守備位置は変更しない）
  const swapBattingOrder=(a,b)=>{
    const nl=[...lineup];
    const tmp=nl[a];nl[a]=nl[b];nl[b]=tmp;
    setLineup(nl);
  };
  // 守備位置の入れ替え（グラウンド図クリック用）
  const swapLineupSlots=(a,b)=>{
    const nl=[...lineup];
    const aPos=nl[a]._assignedPos||nl[a].pos;
    const bPos=nl[b]._assignedPos||nl[b].pos;
    nl[a]={...nl[a],_assignedPos:bPos};
    nl[b]={...nl[b],_assignedPos:aPos};
    setLineup(nl);
  };
  const assignBenchToPos=(benchPlayer,pos,targetIdx)=>{
    const nl=[...lineup];
    nl[targetIdx]={...benchPlayer,_assignedPos:pos};
    setLineup(nl);
    setDetailId(benchPlayer.id);
  };
  const optimize=()=>{
    let best=bestLineup(team).map(p=>({...p,_assignedPos:p._assignedPos||p.pos}));
    let improved=true;
    const score=lu=>teamOVR(team,lu);
    while(improved){
      improved=false;
      for(let i=0;i<best.length;i++){
        for(let j=i+1;j<best.length;j++){
          const trial=[...best];
          const aPos=trial[i]._assignedPos||trial[i].pos;
          const bPos=trial[j]._assignedPos||trial[j].pos;
          trial[i]={...trial[i],_assignedPos:bPos};
          trial[j]={...trial[j],_assignedPos:aPos};
          if(score(trial)>score(best)){best=trial;improved=true;}
        }
      }
      for(const bp of team.fielders){
        if(best.some(p=>p.id===bp.id))continue;
        for(let i=0;i<best.length;i++){
          const pos=best[i]._assignedPos||best[i].pos;
          const trial=[...best];
          trial[i]={...bp,_assignedPos:pos};
          if(score(trial)>score(best)){best=trial;improved=true;}
        }
      }
    }
    setLineup(best);
    setDetailId(best[0]?.id||null);
    clearSelections();
  };

  const handlePosClick=(pos)=>{
    const idx=posIdx[pos];
    if(idx===-1)return;
    if(selectedBenchId){
      const bp=bench.find(p=>p.id===selectedBenchId);
      if(bp)assignBenchToPos(bp,pos,idx);
      clearSelections();
      return;
    }
    if(selectedIdx===null){
      setSelectedIdx(idx);
      setDetailId(lineup[idx]?.id||detailId);
      return;
    }
    if(selectedIdx===idx){clearSelections();return;}
    swapLineupSlots(selectedIdx,idx);
    clearSelections();
  };

  const roleCard=(title,players,color)=> (
    <div style={{background:'#0b1d2d',border:'1px solid #1e4c73',borderRadius:8,padding:8,marginTop:8}}>
      <div style={{fontSize:10,color:'#8eb3d6',marginBottom:6}}>{title}</div>
      {players.length===0?<div style={{fontSize:11,color:'#5a7898'}}>該当なし</div>:players.map(p=><div key={p.id} onClick={()=>setDetailId(p.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 4px',cursor:'pointer',borderRadius:6,background:detailId===p.id?color+'22':'#101e2e'}}>
        <span style={{fontSize:12,fontWeight:700}}>{p.name}</span>
        <span style={{fontSize:11,fontWeight:900,color:ovrColor(calcOVR(p))}}>{calcOVR(p)}</span>
      </div>)}
    </div>
  );

  const PosNode=({pos})=>{
    const c=GND_COORDS[pos],idx=posIdx[pos],player=idx>=0?lineup[idx]:null;
    const isSel=selectedIdx===idx&&idx>=0;
    const benchActive=!!selectedBenchId;
    const displayOvr=player?Math.round(effOVR(player,pos)):0;
    return <div onClick={()=>handlePosClick(pos)} style={{position:'absolute',left:`${c.x}%`,top:`${c.y}%`,transform:'translate(-50%,-50%)',cursor:'pointer',zIndex:10,userSelect:'none'}}>
      <div style={{background:isSel?pInfo.c+'33':benchActive?'#14304a':'#101e2e',border:`1px solid ${isSel?pInfo.c:'#1d3550'}`,borderRadius:8,padding:'4px 7px',minWidth:74,textAlign:'center',backdropFilter:'blur(4px)',boxShadow:isSel?`0 0 14px ${pInfo.c}88`:undefined}}>
        <div style={{fontSize:8,color:'#8eb3d6',marginBottom:1}}>{pos}</div>
        {player?<><div style={{fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{player.name}</div><div style={{fontSize:11,color:ovrColor(displayOvr),fontWeight:900}}>{displayOvr}</div></>:<div style={{fontSize:10,color:'#2a3a4a',padding:'4px 0'}}>―</div>}
      </div>
    </div>;
  };

  return <div>
    <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center',flexWrap:'wrap'}}>
      <button onClick={()=>setTab('field')} style={{background:tab==='field'?pInfo.c+'33':'#10273b',color:tab==='field'?pInfo.c:'#8eb3d6',border:`1px solid ${tab==='field'?pInfo.c:'#244d71'}`,borderRadius:999,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>守備配置</button>
      <button onClick={()=>setTab('pitch')} style={{background:tab==='pitch'?pInfo.c+'33':'#10273b',color:tab==='pitch'?pInfo.c:'#8eb3d6',border:`1px solid ${tab==='pitch'?pInfo.c:'#244d71'}`,borderRadius:999,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>投手起用</button>
      <div style={{marginLeft:8,fontSize:12,color:'#8eb3d6'}}>チームOVR</div>
      <div style={{fontSize:18,fontWeight:900,color:ovrColor(totalOVR)}}>{totalOVR}</div>
      <Btn onClick={optimize} sm style={{background:pInfo.c}}>AIで最適化</Btn>
      {(selectedIdx!==null||selectedBenchId)&&<Btn onClick={clearSelections} sm style={{background:'#1a2535'}}>選択解除</Btn>}
      <div style={{marginLeft:'auto',fontSize:11,color:'#8eb3d6'}}>{selectedBenchId?'ベンチ選手を選択中 → 配置したい守備位置をタップ':'タップ→タップで守備位置を入れ替え'}</div>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1.15fr 0.85fr',gap:16}}>
      <div>
        {tab==='field'&&<>
          <div style={{position:'relative',paddingBottom:'72%',background:'linear-gradient(170deg,#0b2a0b 0%,#1a3d1a 45%,#0b2a0b 100%)',borderRadius:12,border:'1px solid #1a3a1a',overflow:'hidden',marginBottom:12}}>
            <div style={{position:'absolute',inset:0,pointerEvents:'none'}}>
              <div style={{position:'absolute',bottom:'14%',left:'50%',width:2,height:'42%',background:'#ffffff18',transformOrigin:'bottom center',transform:'rotate(-45deg)'}}/>
              <div style={{position:'absolute',bottom:'14%',left:'50%',width:2,height:'42%',background:'#ffffff18',transformOrigin:'bottom center',transform:'rotate(45deg)'}}/>
              <div style={{position:'absolute',bottom:'14%',left:'50%',transform:'translateX(-50%)',width:'82%',height:'70%',border:'1px solid #1a4a1a55',borderRadius:'50% 50% 0 0'}}/>
              <div style={{position:'absolute',bottom:'14%',left:'50%',transform:'translateX(-50%) rotate(45deg)',width:84,height:84,border:'2px solid #c8a84455',background:'#8B691422',borderRadius:2}}/>
              <div style={{position:'absolute',left:'50%',top:'68%',transform:'translate(-50%,-50%)',width:16,height:16,background:'#8B691466',borderRadius:'50%'}}/>
            </div>
            {FPOS.map(pos=><PosNode key={pos} pos={pos}/>)}
            {(selectedIdx!==null||selectedBenchId)&&<div style={{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',background:'#FFB30088',border:'1px solid #FFB300',borderRadius:6,padding:'3px 12px',fontSize:11,color:'#FFB300',pointerEvents:'none'}}>{selectedBenchId?'差し込みたい守備位置をタップ':'入れ替え先のポジションをタップ'}</div>}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <Card style={{padding:10}}>
              <SectionTitle>打順</SectionTitle>
              {lineup.map((p,i)=>{const ap=p._assignedPos||p.pos;const isSel=selectedIdx===i;return <div key={p.id} onClick={()=>{setDetailId(p.id);setSelectedBenchId(null);if(selectedIdx===null)setSelectedIdx(i);else if(selectedIdx===i)clearSelections();else{swapBattingOrder(selectedIdx,i);clearSelections();}}} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 8px',background:isSel?pInfo.c+'33':detailId===p.id?'#13202e':'#0a1218',border:`1px solid ${isSel?pInfo.c:'#1a2535'}`,borderRadius:6,cursor:'pointer',minHeight:38,marginBottom:4}}>
                <span style={{width:16,fontSize:10,color:'#8eb3d6',fontWeight:700}}>{i+1}</span>
                <span style={{width:18,fontSize:10,color:'#90CAF9',fontWeight:700}}>{posShort(ap)}</span>
                <span style={{flex:1,fontSize:12,fontWeight:700}}>{p.name}</span>
                <span style={{fontSize:11,color:'#8eb3d6'}}>{aptFor(p,ap)}</span>
                <span style={{fontSize:11,fontWeight:900,color:ovrColor(effOVR(p,ap))}}>{effOVR(p,ap)}</span>
              </div>})}
            </Card>
            <Card style={{padding:10}}>
              <SectionTitle>ベンチ（タップで差し込み）</SectionTitle>
              {bench.slice(0,12).map(p=>{const active=selectedBenchId===p.id;return <div key={p.id} onClick={()=>{setDetailId(p.id);setSelectedIdx(null);setSelectedBenchId(active?null:p.id);}} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 8px',background:active?pInfo.c+'33':detailId===p.id?'#13202e':'#0a1218',border:`1px solid ${active?pInfo.c:'#1a2535'}`,borderRadius:6,cursor:'pointer',minHeight:38,marginBottom:4}}>
                <span style={{width:18,fontSize:10,color:'#90CAF9',fontWeight:700}}>{posShort(p.pos)}</span>
                <span style={{flex:1,fontSize:12,fontWeight:700}}>{p.name}</span>
                <span style={{fontSize:11,color:'#4a6a8a'}}>{p.positions?.length||1}</span>
                <span style={{fontSize:11,fontWeight:900,color:ovrColor(calcOVR(p,p.pos))}}>{calcOVR(p,p.pos)}</span>
              </div>})}
            </Card>
          </div>
        </>}

        {tab==='pitch'&&<Card>
          <SectionTitle>先発ローテーション</SectionTitle>
          <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap',marginBottom:10}}><div style={{fontSize:11,color:'#4a6a8a'}}>先発ローテ枚数</div>{[4,5,6].map(n=><button key={n} onClick={()=>onTeamChange({...team,rotSize:n})} style={{background:(team.rotSize||6)===n?pInfo.c+'33':'#0a1218',color:(team.rotSize||6)===n?pInfo.c:'#90CAF9',border:`1px solid ${(team.rotSize||6)===n?pInfo.c:'#1a2535'}`,borderRadius:5,padding:'6px 10px',fontSize:11,cursor:'pointer',minHeight:36}}>{n}</button>)}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div>
              {starters.map((p,i)=><div key={p.id} onClick={()=>setDetailId(p.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',background:detailId===p.id?pInfo.c+'22':'#0a1218',border:'1px solid #1a2535',borderRadius:6,marginBottom:4,cursor:'pointer'}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700}}>{i+1}. {p.name}</div>
                  <div style={{fontSize:10,color:'#4a6a8a'}}>{p.hand?.th}投 / {p.role}</div>
                </div>
                <span style={{fontSize:11,fontWeight:900,color:ovrColor(calcOVR(p))}}>{calcOVR(p)}</span>
              </div>)}
            </div>
            <div>
              {roleCard('クローザー',pen.closer,pInfo.c)}
              {roleCard('セットアッパー',pen.setup,pInfo.c)}
              {roleCard('中継ぎ',pen.middle,pInfo.c)}
            </div>
          </div>
          {selectedPlayer?.isP&&<div style={{marginTop:10,paddingTop:10,borderTop:'1px solid #1a2535'}}>
            <div style={{fontSize:10,color:'#4a6a8a',marginBottom:6}}>投手ロール変更</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {['先発','リリーフ','クローザー'].map(role=><button key={role} onClick={()=>updateTeamPlayer(selectedPlayer.id,p=>({...p,role}))} style={{background:selectedPlayer.role===role?pInfo.c+'33':'#0a1218',color:selectedPlayer.role===role?pInfo.c:'#90CAF9',border:`1px solid ${selectedPlayer.role===role?pInfo.c:'#1a2535'}`,borderRadius:5,padding:'6px 10px',fontSize:11,cursor:'pointer',minHeight:36}}>{role}</button>)}
            </div>
          </div>}
          <div style={{marginTop:10,fontSize:11,color:'#4a6a8a'}}>選手詳細でロール変更すると、起用枠とチームOVRがすぐ更新されます。</div>
        </Card>}
      </div>

      <div>
        <Card style={{marginBottom:12}}>
          <SectionTitle style={{color:'#55c7ff'}}>選手詳細</SectionTitle>
          {selectedPlayer?<div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div>
                <div style={{fontSize:16,fontWeight:900}}>{selectedPlayer.name}</div>
                <div style={{fontSize:11,color:'#4a6a8a'}}>{selectedPlayer.age}歳 {selectedPlayer.isP?`${selectedPlayer.role} / ${selectedPlayer.hand?.th}投`:`${selectedPlayer.hand?.bat}打 / 主守備 ${selectedPlayer.pos}`}</div><div style={{fontSize:11,color:'#4a6a8a',marginTop:3}}>習熟度 {(masteryFromAccum(selectedPlayer,accumulated)*100).toFixed(0)}%</div>
              </div>
              <div style={{textAlign:'right'}}><div style={{fontSize:20,fontWeight:900,color:ovrColor(selectedPlayer.isP?calcOVR(selectedPlayer):effOVR(selectedPlayer,selectedPlayer._assignedPos||selectedPlayer.pos))}}>{selectedPlayer.isP?calcOVR(selectedPlayer):effOVR(selectedPlayer,selectedPlayer._assignedPos||selectedPlayer.pos)}</div><div style={{fontSize:10,color:'#3a5a7a'}}>OVR</div></div>
            </div>
            {selectedPlayer.isP?<>
              <ParamBar label="球速" value={selectedPlayer.p.vel} width={130}/>
              <ParamBar label="制球" value={selectedPlayer.p.ctrl} width={130}/>
              <ParamBar label="スタ" value={selectedPlayer.p.stam} width={130}/>
              <ParamBar label="ノビ" value={selectedPlayer.p.nobi} width={130}/>
              <ParamBar label="守備" value={selectedPlayer.p.fld} width={130}/>
            </>:<>
              <ParamBar label="直球" value={selectedPlayer.p.cf} width={130}/>
              <ParamBar label="変化" value={selectedPlayer.p.cb} width={130}/>
              <ParamBar label="長打" value={selectedPlayer.p.pw} width={130}/>
              <ParamBar label="選球" value={selectedPlayer.p.dc} width={130}/>
              <ParamBar label="走力" value={selectedPlayer.p.sp} width={130}/>
              <ParamBar label="守備" value={selectedPlayer.p.df} width={130}/>
              <ParamBar label="肩" value={selectedPlayer.p.arm} width={130}/>
              {selectedPlayer.pos==='捕手'&&<ParamBar label="配球" value={selectedPlayer.p.ld} width={130}/>} 
              <div style={{marginTop:8}}>
                <div style={{fontSize:10,color:'#4a6a8a',marginBottom:4}}>守備適性</div>
                {(selectedPlayer.positions||[{pos:selectedPlayer.pos,apt:100}]).map(pp=><div key={pp.pos} style={{display:'flex',justifyContent:'space-between',fontSize:11,padding:'3px 0'}}><span>{pp.pos}</span><span style={{color:'#90CAF9'}}>{pp.apt}</span></div>)}
              </div>
            </>}
            <div style={{marginTop:8}}>{(selectedPlayer.specials||[]).slice(0,6).map(s=><Badge key={s.id} sp={s}/>)}</div>
            <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid #1a2535'}}>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:8}}>
                <div style={{fontSize:10,color:'#4a6a8a'}}>伸び代</div>
                <div style={{fontSize:12,fontWeight:900,color:'#FFD700'}}>{playerPotentialLabel(selectedPlayer)}</div>
                <div style={{fontSize:10,color:'#4a6a8a'}}>育成方針</div>
                <select value={selectedPlayer.trainPolicy||'balanced'} onChange={e=>applyTrainPolicy(selectedPlayer.id,e.target.value)} style={{background:'#0a1218',color:'white',border:'1px solid #1a2535',borderRadius:6,padding:'7px 10px',fontSize:11}}>
                  {TRAIN_POLICIES.filter(tp=>selectedPlayer.isP?tp.forPit:tp.forBat).map(tp=><option key={tp.id} value={tp.id}>{tp.n}</option>)}
                </select>
              </div>
              <div style={{fontSize:10,color:'#4a6a8a',lineHeight:1.7}}>現在: {trainPolicyName(selectedPlayer.trainPolicy||'balanced')}</div>
            </div>
          </div>:<div style={{fontSize:12,color:'#4a6a8a'}}>選手をタップしてください。</div>}
        </Card>

        {tab==='field'&&<Card>
          <SectionTitle>育成の一括操作</SectionTitle>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
            <Btn sm style={{background:'#1a2535'}} onClick={()=>bulkSetTrainPolicy(p=>!p.isP&&p.age<=25,'contact')}>若手野手→ミート</Btn>
            <Btn sm style={{background:'#1a2535'}} onClick={()=>bulkSetTrainPolicy(p=>p.isP&&p.age<=25,'control')}>若手投手→制球</Btn>
            <Btn sm style={{background:'#1a2535'}} onClick={()=>bulkSetTrainPolicy(p=>!p.isP&&calcOVR(p,p.pos)<=60,'defense')}>低OVR野手→守備</Btn>
            <Btn sm style={{background:'#1a2535'}} onClick={()=>bulkSetTrainPolicy(()=>true,'balanced')}>全員バランス</Btn>
          </div>
          <div style={{fontSize:11,color:'#4a6a8a',lineHeight:1.8}}>
            守備重要ポジションから順に最適化しています。遊撃・中堅・捕手の配置で全体OVRが大きく動きやすく、適性の低い選手を無理に置くと有効OVRが落ちます。ベンチ選手を選んでから守備位置をタップすると、その位置に差し込めます。
          </div>
        </Card>}
      </div>
    </div>
  </div>;
}



function NavTab({active,label,onClick}){return <button onClick={onClick} style={{background:active?'#162030':'transparent',color:active?'#4db6ff':'#5a7898',border:`1px solid ${active?'#1e3044':'transparent'}`,borderRadius:999,padding:'8px 16px',fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',transition:'all 0.15s'}}>{label}</button>;}

function PlayerName({player,onOpen,style={}}){
  if(!player) return <span style={style}>-</span>;
  const tag=player.isP===true?roleShort(player.role):posShort(player.pos||player._assignedPos),tagKey=player.isP===true?(player.role||'投'):(player.pos||player._assignedPos),tc=posBadgeColor(tagKey);
  return <button onClick={(e)=>{e.stopPropagation();onOpen&&onOpen(player);}} style={{background:'transparent',border:'none',padding:0,margin:0,color:'#7fd0ff',fontWeight:700,cursor:'pointer',font:'inherit',textAlign:'left',display:'inline-flex',alignItems:'center',gap:6,...style}}><span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',minWidth:22,height:20,padding:'0 6px',borderRadius:999,background:tc+'22',border:`1px solid ${tc}66`,color:tc,fontSize:10,fontWeight:900,flexShrink:0}}>{tag}</span><span>{player.name}</span></button>;
}
function PlayerDetailModal({player,accumulated,careerAccumulated,onClose,yearlyStats,retiredPlayers}){
  if(!player) return null;
  const [modalTab,setModalTab]=useState('stats');
  const s=normalizeStatLine(accumulated?.[player.id]||{});
  const cs=normalizeStatLine(careerAccumulated?.[player.id]||{});
  const tc=TINFO[player.tk]?.c||'#4db6ff';
  const ovr=player.isP===true?calcOVR(player):effOVR(player,player.pos);
  const titles=[...(player.titles||[])].sort((a,b)=>b.year-a.year);
  const playerYearly=(yearlyStats||{})[player.id]||[];
  const isRetired=(retiredPlayers||[]).some(r=>r.id===player.id);
  const retiredInfo=(retiredPlayers||[]).find(r=>r.id===player.id);
  return <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(1,8,18,0.86)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div onClick={(e)=>e.stopPropagation()} style={{width:'min(1000px,100%)',maxHeight:'90vh',overflowY:'auto',background:'#071827',border:'1px solid #1d4466',boxShadow:'0 20px 80px #000a',borderRadius:16,padding:18}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:12}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{fontSize:24,fontWeight:900,color:tc}}>{player.name}</div>
            {isRetired&&<span style={{background:'#3a1a1a',color:'#ff9a6c',border:'1px solid #6a3a3a',borderRadius:6,padding:'3px 10px',fontSize:12,fontWeight:700}}>引退 {retiredInfo?.retiredYear||''}年 {retiredInfo?.retiredAge||'?'}歳で</span>}
          </div>

function RosterTable({players,accumulated,teamColor,onOpenPlayer}){
  const [sortKey,setSortKey]=useState('ovr');
  const [role,setRole]=useState('all');
  const filtered=[...players].filter(p=>role==='all'?true:role==='pit'?p.isP:!p.isP);
  const getValue=(p)=>{
    const s=accumulated[p.id]||{};
    if(sortKey==='age') return p.age;
    if(sortKey==='name') return p.name;
    if(sortKey==='ovr') return p.isP===true?calcOVR(p):effOVR(p,p.pos);
    if(sortKey==='mastery') return masteryFromAccum(p,accumulated);
    if(sortKey==='avg') return (s.ab||0)>0 ? ((s.h||0)/(s.ab||1)) : 0;
    if(sortKey==='era') return (s.ip3||0)>0 ? (((s.er||0)/((s.ip3||1)/3))*9) : 99;
    return 0;
  };
  const rows=filtered.sort((a,b)=>{
    const av=getValue(a), bv=getValue(b);
    if(sortKey==='name') return String(av).localeCompare(String(bv),'ja');
    return sortKey==='era' ? av-bv : bv-av;
  });
  return <Card style={{background:'#0b1d2d',borderColor:'#1e4c73'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
      <SectionTitle style={{color:'#55c7ff'}}>選手一覧</SectionTitle>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {[['all','全員'],['bat','野手'],['pit','投手']].map(([id,l])=><button key={id} onClick={()=>setRole(id)} style={{background:role===id?teamColor+'44':'#10273b',color:role===id?teamColor:'#8eb3d6',border:`1px solid ${role===id?teamColor:'#244d71'}`,borderRadius:999,padding:'7px 12px',fontSize:11,cursor:'pointer',fontWeight:700}}>{l}</button>)}
      </div>
    </div>
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
        <thead><tr style={{borderBottom:'1px solid #1e4c73'}}>{[['name','選手'],['age','年齢'],['ovr','OVR'],['mastery','習熟'],['avg','打率'],['era','防御率'],['pos','守備/役割'],['policy','育成']].map(([k,l])=><th key={k} onClick={()=>k!=='pos'&&k!=='policy'&&setSortKey(k)} style={{padding:'6px 8px',textAlign:k==='name'||k==='pos'||k==='policy'?'left':'center',color:sortKey===k?'#55c7ff':'#8eb3d6',cursor:k!=='pos'&&k!=='policy'?'pointer':'default',whiteSpace:'nowrap'}}>{l}</th>)}</tr></thead>
        <tbody>
          {rows.map(p=>{const s=accumulated[p.id]||{}; return <tr key={p.id} style={{borderBottom:'1px solid #08131e'}}>
            <td style={{padding:'6px 8px',fontWeight:600}}><PlayerName player={p} onOpen={onOpenPlayer}/></td>
            <td style={{padding:'6px 8px',textAlign:'center'}}>{p.age}</td>
            <td style={{padding:'6px 8px',textAlign:'center',fontWeight:800,color:ovrColor(p.isP===true?calcOVR(p):effOVR(p,p.pos))}}>{p.isP===true?calcOVR(p):effOVR(p,p.pos)}</td>
            <td style={{padding:'6px 8px',textAlign:'center',color:'#90CAF9'}}>{Math.round(masteryFromAccum(p,accumulated)*100)}%</td>
            <td style={{padding:'6px 8px',textAlign:'center'}}>{p.isP===true?'—':avg(s.ab||0,s.h||0)}</td>
            <td style={{padding:'6px 8px',textAlign:'center'}}>{p.isP===true?era(s.ip3||0,s.er||0):'—'}</td>
            <td style={{padding:'6px 8px',whiteSpace:'nowrap'}}>{p.isP?p.role:(p.positions||[{pos:p.pos,apt:100}]).map(x=>`${posShort(x.pos)}${x.apt}`).slice(0,3).join(' / ')}</td>
            <td style={{padding:'6px 8px',whiteSpace:'nowrap',color:'#8eb3d6'}}>{trainPolicyName(p.trainPolicy||'balanced')}</td>
          </tr>;})}
        </tbody>
      </table>
    </div>
  </Card>;

function genDraftProspects(){
  const pool=[]; const positions=['先発','先発','リリーフ','クローザー',...FPOS,...FPOS,'先発'];
  for(let i=0;i<80;i++){
    const pos=rf(positions); const age=ri(18,22);
    let q=cl(gauss(58,14),32,96);
    if(_r()<0.10) q=cl(gauss(78,8),60,104); // 注目株
    if(_r()<0.02) q=cl(gauss(94,6),82,112); // 数年に一度
    const p=(pos==='先発'||pos==='リリーフ'||pos==='クローザー')?genPitcher('draft',age,q,pos):genBatter('draft',age,pos,q);
    p.draftRank=pos;
    p.note=q>=90?'怪物候補':q>=75?'即戦力候補':age<=19?'素材型':'有望株';
    pool.push(p);
  }
  return pool.sort((a,b)=>(b.isP?calcOVR(b):calcOVR(b,b.pos))-(a.isP?calcOVR(a):calcOVR(a,a.pos)));
}
function teamNeedsScore(team,player){
  if(player.isP){
    const starters=team.pitchers.filter(p=>p.role==='先発').length;
    const rels=team.pitchers.filter(p=>p.role!=='先発').length;
    let need=0;
    if(player.role==='先発') need += starters<6?12:0;
    else need += rels<7?10:0;
    return need + calcOVR(player)*0.6;
  }
  const pos=player.pos;
  const count=team.fielders.filter(f=>f.positions?.some(pp=>pp.pos===pos)||f.pos===pos).length;
  const weakSpot=Math.max(0,3-count)*8;
  return weakSpot + effOVR(player,pos)*0.7;
}
function cpuDraftPick(team, prospects){
  return [...prospects].sort((a,b)=>teamNeedsScore(team,b)-teamNeedsScore(team,a))[0];
}



function marketPlayerCost(player,mult=1){
  const ovr=Math.round(player.isP?calcOVR(player):effOVR(player,player.pos));
  return Math.max(800, Math.round((ovr*ovr*1.8 + (player.age<27?1500:0))*mult/100)*100);
}

function cpuAutoSignMarket(teams, market, type='fa'){

    if(pick && (pick.ask||0) <= budget+needs*100){ next=signPlayerToTeam(next,tk,pick); rem=rem.filter(p=>p.id!==pick.id); }
  });

}
function cpuAutoSignMarketRounds(teams, market, type='fa', rounds=2){let next={...teams},rem=[...market];for(let i=0;i<rounds&&rem.length;i++){const sim=cpuAutoSignMarket(next,rem,type);next=sim.teams;rem=sim.remaining;}return{teams:next,remaining:rem};}
function cpuAutoTradeBetweenTeams(teams,playerTeam,rounds=4){let next={...teams};const clubs=[...CENTRAL,...PACIFIC].filter(k=>k!==playerTeam).sort(()=>_r()-0.5);const move=(team,removeP,addP,tk)=>addP.isP?{...team,pitchers:[...team.pitchers.filter(p=>p.id!==removeP.id),{...addP,tk}],fielders:team.fielders.filter(f=>f.id!==removeP.id)}:{...team,fielders:[...team.fielders.filter(f=>f.id!==removeP.id),{...addP,tk}],pitchers:team.pitchers.filter(p=>p.id!==removeP.id)};for(let i=0;i<rounds;i++){const a=clubs[i%clubs.length],b=clubs[(i+3)%clubs.length];if(!a||!b||a===b)continue;const ta=next[a],tb=next[b];if(!ta||!tb)continue;const aBench=[...ta.fielders].filter(f=>!bestLineup(ta).some(x=>x.id===f.id)).sort((x,y)=>effOVR(y,y.pos)-effOVR(x,x.pos));const bBench=[...tb.fielders].filter(f=>!bestLineup(tb).some(x=>x.id===f.id)).sort((x,y)=>effOVR(y,y.pos)-effOVR(x,x.pos));const aArms=[...ta.pitchers].filter(p=>p.role!=='先発').sort((x,y)=>calcOVR(y)-calcOVR(x));const bArms=[...tb.pitchers].filter(p=>p.role!=='先発').sort((x,y)=>calcOVR(y)-calcOVR(x));const aChip=aBench[0]||aArms[0];const bChip=bBench[0]||bArms[0];const aWant=[...tb.fielders,...tb.pitchers].sort((x,y)=>teamNeedsScore(ta,y)-teamNeedsScore(ta,x))[0];const bWant=[...ta.fielders,...ta.pitchers].sort((x,y)=>teamNeedsScore(tb,y)-teamNeedsScore(tb,x))[0];if(!aChip||!bChip||!aWant||!bWant)continue;const fitA=teamNeedsScore(ta,aWant)-teamNeedsScore(ta,aChip);const fitB=teamNeedsScore(tb,bWant)-teamNeedsScore(tb,bChip);const valGap=Math.abs((aWant.isP?calcOVR(aWant):effOVR(aWant,aWant.pos))-(bWant.isP?calcOVR(bWant):effOVR(bWant,bWant.pos)));if(fitA<8||fitB<8||valGap>12)continue;next[a]=move(ta,bWant,aWant,a);next[b]=move(tb,aWant,bWant,b);}return next;}
function genTradeOffers(teams, playerTeam){
  const my=teams[playerTeam]; if(!my) return [];
  const myBench=[...my.fielders].filter(f=>!bestLineup(my).some(x=>x.id===f.id)).sort((a,b)=>effOVR(b,b.pos)-effOVR(a,a.pos));
  const myArms=[...my.pitchers].filter(p=>p.role!=='先発').sort((a,b)=>calcOVR(b)-calcOVR(a));
  const chip = myBench[0] || myArms[0] || [...my.fielders,...my.pitchers][0];
  const offers=[];
  [...CENTRAL,...PACIFIC].filter(k=>k!==playerTeam).slice(0,5).forEach(tk=>{
    const opp=teams[tk];
    const target=[...opp.fielders,...opp.pitchers].sort((a,b)=>teamNeedsScore(my,b)-teamNeedsScore(my,a))[0];
    if(chip && target){ offers.push({id:uid(),fromTeam:tk,give:target,receive:chip,cash:ri(0,20)*100,summary:`${TINFO[tk].ab}が ${target.name} ↔ ${chip.name} を提示`}); }
  });

}
function applyTrade(teams, playerTeam, offer){
  const from=offer.fromTeam; const recv=offer.receive; const give=offer.give;
  const next={...teams};
  const a={...next[playerTeam]}, b={...next[from]};
  const rem=(arr,id)=>arr.filter(p=>p.id!==id);
  if(recv.isP){ a.pitchers=rem(a.pitchers,recv.id); b.pitchers=[...rem(b.pitchers,give.id), {...recv,tk:from}]; }
  else { a.fielders=rem(a.fielders,recv.id); b.fielders=[...rem(b.fielders,give.id), {...recv,tk:from}]; }
  if(give.isP){ b.pitchers=rem(b.pitchers,give.id); a.pitchers=[...rem(a.pitchers,recv.id), {...give,tk:playerTeam}]; }
  else { b.fielders=rem(b.fielders,give.id); a.fielders=[...rem(a.fielders,recv.id), {...give,tk:playerTeam}]; }
  next[playerTeam]=a; next[from]=b; return next;
}

function DraftScreen({teams,playerTeam,onComplete}){
  const [round,setRound]=useState(1);
  const [prospects,setProspects]=useState(()=>genDraftProspects());
  const [selected,setSelected]=useState(null);
  const [drafted,setDrafted]=useState([]);
  const order=useMemo(()=>[...CENTRAL,...PACIFIC].sort((a,b)=>teamOVR(teams[a])-teamOVR(teams[b])),[teams]);
  const myPicks=drafted.filter(p=>p.teamKey===playerTeam);
  const visibleProspects=[...prospects].slice(0,40);
  const runCpuRounds=(startRound, remProspects, picks, includePlayerAuto=false)=>{
    let rem=[...remProspects], out=[...picks];
    for(let r=startRound;r<=6;r++){
      order.forEach(tk=>{
        if(!rem.length) return;
        if(tk===playerTeam && !includePlayerAuto) return;
        const pick=cpuDraftPick(teams[tk], rem);
        out.push({...pick,teamKey:tk,round:r}); rem=rem.filter(p=>p.id!==pick.id);
      });
    }
    return {rem,out};
  };
  const advanceRound=(currentProspects,currentDrafted)=>{
    let rem=[...currentProspects], picks=[...currentDrafted];
    order.forEach(tk=>{
      if(tk===playerTeam||!rem.length) return;
      const pick=cpuDraftPick(teams[tk], rem);
      picks.push({...pick,teamKey:tk,round}); rem=rem.filter(p=>p.id!==pick.id);
    });
    return {rem,picks};
  };
  const finishDraft=(autoForPlayer=true)=>{
    const sim=runCpuRounds(round, prospects, drafted, autoForPlayer);
    const allPicks=sim.out;
    const nextTeams={...teams};
    allPicks.forEach(p=>{
      const t={...nextTeams[p.teamKey]};
      if(p.isP) t.pitchers=[...t.pitchers,{...p,tk:p.teamKey,age:p.age}];
      else t.fielders=[...t.fielders,{...p,tk:p.teamKey,age:p.age}];
      nextTeams[p.teamKey]=t;
    });
    onComplete(nextTeams,allPicks);
  };

    if(!selected) return;
    let rem=prospects.filter(p=>p.id!==selected.id);
    let picks=[...drafted,{...selected,teamKey:playerTeam,round}];
    const progressed=advanceRound(rem,picks); rem=progressed.rem; picks=progressed.picks;
    setDrafted(picks); setProspects(rem); setSelected(null);
    if(round>=6) finishDraft(false); else setRound(r=>r+1);
  };
  const picksByRound=useMemo(()=>{
    const m={}; for(let r=1;r<=6;r++) m[r]=order.map(tk=>drafted.find(p=>p.round===r&&p.teamKey===tk)||null); return m;
  },[drafted,order]);

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'end',marginBottom:16}}><div><div style={{fontSize:28,fontWeight:900}}>ドラフト会議</div><div style={{fontSize:12,color:'#4a6a8a'}}>第{round}巡指名 / いつでも以降を自動指名で終了可能</div></div><div style={{display:'flex',gap:8}}><Btn onClick={()=>finishDraft(true)} sm style={{background:'#1a2535'}}>以降は自動指名で終了</Btn><Btn onClick={handleMyPick} color={TINFO[playerTeam].c} disabled={!selected}>この選手を指名</Btn></div></div>

function PostseasonScreen({teams,standings,onComplete}){
  const [stage,setStage]=useState('start');
  const [results,setResults]=useState({central:null,pacific:null,japan:null});
  const rankLeague=(lg)=>[...lg].sort((a,b)=>(standings[a]?.rank||99)-(standings[b]?.rank||99)).slice(0,3);
  const simSeries=(a,b,bestOf,advA=0)=>{
    let winsA=advA,winsB=0,log=[]; let game=1; let ra=0, rb=0;
    const target=Math.ceil(bestOf/2);
    while(winsA<target && winsB<target && game<=bestOf+2){
      const home = game%2===1 ? a : b;
      const away = home===a ? b : a;
      const {hs,as}=quickSim(home,away,teams,ra,rb);
      ra++; rb++;
      const homeWin = hs>as;
      const winner = homeWin ? home : away;
      if(winner===a) winsA++; else winsB++;
      log.push({game,home,away,hs,as,winner,winsA,winsB});
      game++;
    }
    return {a,b,winsA,winsB,winner:winsA>winsB?a:b,log,bestOf,advA};
  };
  const simulateRound=()=>{
    if(stage==='start'){
      const c=rankLeague(CENTRAL), p=rankLeague(PACIFIC);
      const centralFirst=simSeries(c[1],c[2],3,0);
      const pacificFirst=simSeries(p[1],p[2],3,0);
      const centralFinal=simSeries(c[0],centralFirst.winner,7,1);
      const pacificFinal=simSeries(p[0],pacificFirst.winner,7,1);
      setResults({central:{first:centralFirst,final:centralFinal},pacific:{first:pacificFirst,final:pacificFinal},japan:null});
      setStage('league_done');
    } else if(stage==='league_done'){
      const japan=simSeries(results.central.final.winner, results.pacific.final.winner, 7, 0);
      setResults(r=>({...r,japan}));
      setStage('done');
    }
  };
  const SeriesCard=({title,series})=> <Card style={{marginBottom:12}}><SectionTitle>{title}</SectionTitle><div style={{fontSize:13,fontWeight:700,marginBottom:8}}>{TINFO[series.a].n} {series.winsA} - {series.winsB} {TINFO[series.b].n}</div><div style={{fontSize:12,color:'#4a6a8a',marginBottom:8}}>勝者: {TINFO[series.winner].n}</div><div style={{display:'flex',flexDirection:'column',gap:4}}>{series.log.map(g=><div key={g.game} style={{fontSize:11,display:'flex',justifyContent:'space-between',background:'#0f2233',border:'1px solid #1d3a52',borderRadius:6,padding:'6px 8px'}}><span>G{g.game} {TINFO[g.home].ab} vs {TINFO[g.away].ab}</span><span>{g.hs}-{g.as}</span></div>)}</div></Card>;
  return <div style={{minHeight:'100vh',background:'#050a12',color:'white',fontFamily:"'Noto Sans JP',sans-serif",padding:24}}><Font/><div style={{maxWidth:980,margin:'0 auto'}}><div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}><div><div style={{fontSize:24,fontWeight:900}}>ポストシーズン</div><div style={{fontSize:12,color:'#4a6a8a',marginTop:4}}>{stage==='start'?'CS開始前':stage==='league_done'?'日本シリーズ待ち':'ポストシーズン終了'}</div></div><div style={{marginLeft:'auto',display:'flex',gap:8}}>{stage!=='done'&&<Btn onClick={simulateRound}>{stage==='start'?'CSをシミュレート':'日本シリーズをシミュレート'}</Btn>}{stage==='done'&&<Btn onClick={onComplete}>オフシーズンへ</Btn>}</div></div>{stage==='start'&&<Card><SectionTitle>出場球団</SectionTitle><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}><div><div style={{fontSize:13,fontWeight:700,marginBottom:8}}>セ・リーグ</div>{rankLeague(CENTRAL).map((k,i)=><div key={k} style={{padding:'6px 0',fontSize:12}}>{i+1}. {TINFO[k].n}</div>)}</div><div><div style={{fontSize:13,fontWeight:700,marginBottom:8}}>パ・リーグ</div>{rankLeague(PACIFIC).map((k,i)=><div key={k} style={{padding:'6px 0',fontSize:12}}>{i+1}. {TINFO[k].n}</div>)}</div></div></Card>}{results.central&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:16}}><div><SeriesCard title="セ・リーグ CS 1st" series={results.central.first}/><SeriesCard title="セ・リーグ CS Final" series={results.central.final}/></div><div><SeriesCard title="パ・リーグ CS 1st" series={results.pacific.first}/><SeriesCard title="パ・リーグ CS Final" series={results.pacific.final}/></div></div>}{results.japan&&<div style={{marginTop:16}}><SeriesCard title="日本シリーズ" series={results.japan}/></div>}</div></div>;
}

              <SectionTitle>注目イベント・情報</SectionTitle>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {(()=>{const injured=[...teamPlayers].filter(p=>(p.injuryDays||0)>0).sort((a,b)=>(b.injuryDays||0)-(a.injuryDays||0));const injuredNotices=injured.map(p=>({title:`🩹 離脱中: ${p.name}`,body:`${injuryStatusLabel(p)} / ${p.isP?p.role:p.pos}`,tone:'warn',date:fmtD(nextGame?.date||'')}));const allNotices=[...injuredNotices,...(notices.length?notices:[{title:`チームOVR ${currentTeamOVR}`,body:'編成画面で守備位置とベンチ差し込みを調整できます。',tone:'info'},{title:'育成方針',body:'試合準備から選手詳細を開くと個別設定できます。',tone:'good'},{title:'スキップ機能',body:'1週間・1か月単位で進行できます。成績は推計蓄積されます。',tone:'warn'},{title:'日程',body:'6月前後に交流戦が組み込まれています。',tone:'info'}])];return allNotices.slice(0,8).map((n,i)=>{const color=n.tone==='good'?'#66BB6A':n.tone==='warn'?'#FFB300':'#90CAF9';return <div key={i} style={{padding:'10px 12px',background:'#0f2233',border:'1px solid #1d3a52',borderRadius:10}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:6}}><div style={{fontSize:12,fontWeight:700,color}}>{n.title}</div>{n.date&&<span style={{fontSize:9,color:'#4a6a8a',flexShrink:0}}>{n.date}</span>}</div><div style={{fontSize:11,color:'#4a6a8a',marginTop:4}}>{n.body}</div></div>;});})()}
              </div>
            </Card>
            <Card>
              <SectionTitle>次の5試合</SectionTitle>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {season.schedule.filter(g=>!g.played&&(g.homeKey===playerTeam||g.awayKey===playerTeam)).slice(0,5).map(g=><div key={g.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 10px',background:'#0f2233',border:'1px solid #1d3a52',borderRadius:8}}><div><div style={{fontSize:12,fontWeight:700}}>{fmtD(g.date)} {g.homeKey===playerTeam?`vs ${TINFO[g.awayKey].ab}`:`@ ${TINFO[g.homeKey].ab}`}</div><div style={{fontSize:10,color:'#4a6a8a'}}>{g.homeKey===playerTeam?'ホーム':'アウェイ'}</div></div><div style={{fontSize:11,color:'#4a6a8a'}}>{g.homeKey===playerTeam?TINFO[g.awayKey].n:TINFO[g.homeKey].n}</div></div>)}
              </div>
            </Card>
          </div>

          {lastGame&&<BoxScore game={lastGame} playerTeam={playerTeam} onOpenPlayer={setInspectPlayer}/>}
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <Card>
            <SectionTitle>順位表</SectionTitle>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div><div style={{fontSize:12,fontWeight:900,color:'#90CAF9',marginBottom:6}}>セ・リーグ</div><StandingsTable standings={standings} league={CENTRAL} highlight={playerTeam}/></div>
              <div><div style={{fontSize:12,fontWeight:900,color:'#90CAF9',marginBottom:6}}>パ・リーグ</div><StandingsTable standings={standings} league={PACIFIC} highlight={playerTeam}/></div>
            </div>
          </Card>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <Card>
              <SectionTitle>野手成績 <span style={{fontSize:9,color:'#4a6a8a',fontWeight:400}}>クリックでソート</span></SectionTitle>
              <div style={{maxHeight:280,overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>{battingStats.length===0?<div style={{fontSize:12,color:'#4a6a8a'}}>まだ成績がありません</div>:battingStats.slice(0,15).map(s=>{const p=allPlayersIndex[s.id];return <div key={s.id} style={{display:'grid',gridTemplateColumns:'1fr 36px 36px 48px',gap:6,padding:'8px 10px',background:'#0f2233',border:'1px solid #1d3a52',borderRadius:8,fontSize:11}}><div style={{fontWeight:600}}>{p?<PlayerName player={p} onOpen={setInspectPlayer}/>:<span>{s.name}</span>}</div><div style={{textAlign:'right'}}>{s.h}</div><div style={{textAlign:'right'}}>{s.hr}</div><div style={{textAlign:'right',fontWeight:700}}>{s.avg}</div></div>;})}
              </div>
            </Card>
            <Card>
              <SectionTitle>投手成績 <span style={{fontSize:9,color:'#4a6a8a',fontWeight:400}}>クリックでソート</span></SectionTitle>
              <div style={{maxHeight:280,overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>{pitchingStats.length===0?<div style={{fontSize:12,color:'#4a6a8a'}}>まだ成績がありません</div>:pitchingStats.slice(0,15).map(s=>{const p=allPlayersIndex[s.id];return <div key={s.id} style={{display:'grid',gridTemplateColumns:'1fr 46px 36px 48px',gap:6,padding:'8px 10px',background:'#0f2233',border:'1px solid #1d3a52',borderRadius:8,fontSize:11}}><div style={{fontWeight:600}}>{p?<PlayerName player={p} onOpen={setInspectPlayer}/>:<span>{s.name}</span>}</div><div style={{textAlign:'right'}}>{fmtIP(s.ip3)}</div><div style={{textAlign:'right'}}>{s.k}</div><div style={{textAlign:'right',fontWeight:700}}>{s.era}</div></div>;})}
              </div>
            </Card>
          </div>

          <Card>
            <SectionTitle>主力選手</SectionTitle>
            <div style={{maxHeight:320,overflowY:'auto'}}>{[...teamPlayers].sort((a,b)=>(b.isP===true?calcOVR(b):effOVR(b,b.pos))-(a.isP===true?calcOVR(a):effOVR(a,a.pos))).slice(0,15).map(p=><PlayerMini key={p.id} player={p} pos={p.pos} onClick={()=>setInspectPlayer(p)}/> )}</div>
          </Card>
        </div>
      </div>}

      {seasonView==='players'&&<RosterTable players={teamPlayers} accumulated={accumulated} teamColor={pInfo.c} onOpenPlayer={setInspectPlayer}/>}
      {seasonView==='stats'&&<TeamSeasonStats players={teamPlayers} accumulated={accumulated} teamColor={pInfo.c} onOpenPlayer={setInspectPlayer} teams={teams} playerTeam={playerTeam} leagueAccumulated={leagueAccumulated}/>}
      {seasonView==='career'&&<TeamCareerStats players={teamPlayers} careerAccumulated={careerAccumulated} teamColor={pInfo.c} onOpenPlayer={setInspectPlayer} retiredPlayers={retiredPlayers} currentYear={season.year}/>}
      {seasonView==='allstats'&&<AllLeagueStats leagueAccumulated={leagueAccumulated} teams={teams} playerTeam={playerTeam} onOpenPlayer={setInspectPlayer}/>}
      {seasonView==='leaders'&&<LeagueLeaders leagueAccumulated={leagueAccumulated} teams={teams} playerTeam={playerTeam} onOpenPlayer={setInspectPlayer}/>}

      <div style={{position:'fixed',left:0,right:0,bottom:0,zIndex:30,background:'linear-gradient(180deg,#050a1200 0%,#050a12f0 18%,#050a12 100%)',padding:'14px 14px calc(14px + env(safe-area-inset-bottom))'}}>
        <div style={{maxWidth:1200,margin:'0 auto',display:'grid',gridTemplateColumns:'1.2fr .8fr .8fr .8fr .8fr',gap:8}}>
          <Btn onClick={()=>setScreen('gamePrep')} color={pInfo.c} disabled={!nextGame} style={{width:'100%'}}>試合準備</Btn>
          <Btn onClick={()=>handleSkip('next')} style={{background:'#1a2535',width:'100%'}}>次戦まで</Btn>
          <Btn onClick={()=>handleSkip('week')} style={{background:'#1a2535',width:'100%'}}>1週間</Btn>
          <Btn onClick={()=>handleSkip('month')} style={{background:'#1a2535',width:'100%'}}>1か月</Btn>
          <Btn onClick={handleSave} style={{background:'#16283a',width:'100%'}}>セーブ</Btn>
        </div>
      </div>

      {inspectPlayer&&<PlayerDetailModal player={inspectPlayer} accumulated={leagueAccumulated} careerAccumulated={leagueCareerAccumulated} onClose={()=>setInspectPlayer(null)} yearlyStats={yearlyStats} retiredPlayers={retiredPlayers}/>}

      {screen==='gamePrep'&&nextGame&&teams&&lineup&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.90)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}><div style={{background:'#080d14',border:'1px solid #1a2535',borderRadius:12,padding:20,maxWidth:980,width:'100%',maxHeight:'92vh',overflowY:'auto'}}><div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}><div><div style={{fontSize:16,fontWeight:900}}>試合準備</div><div style={{fontSize:11,color:'#3a5a7a',marginTop:2}}>{fmtD(nextGame.date)} | {nextGame.homeKey===playerTeam?`ホーム vs ${TINFO[nextGame.awayKey]?.n}`:`アウェイ @ ${TINFO[nextGame.homeKey]?.n}`}</div></div><div style={{marginLeft:'auto',display:'flex',gap:10}}><Btn onClick={()=>setScreen('season')} sm style={{background:'#1a2535'}}>キャンセル</Btn><Btn onClick={handleSimGame}>試合開始 ▶</Btn></div></div><GroundLayout team={teams[playerTeam]} lineup={lineup} setLineup={setLineup} playerTeam={playerTeam} onTeamChange={handleTeamChange} accumulated={accumulated}/></div></div>}
    </div>
  </div>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<NPBSimulator />);
</script></body></html>
